services:
  banking:
    build:
      context: .
      dockerfile: Dockerfile
    # Local-only tag — `banking:latest` could otherwise collide with a
    # registry image of the same name on `docker compose pull`.
    image: banking:local
    container_name: banking
    restart: unless-stopped
    env_file: .env
    # Bind to localhost only — Tailscale Serve (or Caddy) on the host
    # reverse-proxies from the tailnet interface to here. Never publish
    # this on 0.0.0.0 unless you really mean to.
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data:/app/data
      - ./keys:/app/keys:ro
    # Cap container log size — the default json-file driver grows
    # unbounded, which will eventually fill a Pi's disk.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Join the shared `proxy` network so Caddy can reach this container
    # by its service name (`banking:3000`). The default network is kept
    # so `docker compose` still wires things up sensibly.
    networks:
      - default
      - proxy

networks:
  proxy:
    external: true
