# Builds a multi-arch container image on every push to `main`, pushes it to
# GHCR as `ghcr.io/<owner>/banking:latest` (and `:sha-<short>`), and lets
# Watchtower on the Pi pull it. CI never touches the Pi.
#
# No user-managed secrets required — `GITHUB_TOKEN` (auto-injected) is the
# only credential. `packages: write` lets it push to ghcr.io for this repo.
#
# This workflow does NOT re-run lint/typecheck/test on `main`. The `pr.yml`
# workflow runs them on every PR, and branch protection should require those
# checks to pass before merge. If you push directly to `main` you are
# bypassing CI deliberately — add a branch protection rule to prevent that.
#
# To temporarily disable auto-deploy: disable this workflow in the Actions
# tab, or stop pushing to `main`. Manual builds: Actions → Deploy → Run
# workflow. Rollback: see DEPLOY.md "Rollback".

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Pi is arm64; CI runs amd64 under QEMU for arm64. Add `linux/amd64`
          # here if you ever want to run the same image on an x86 host.
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
